<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>PhoenixStore - App</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#F2F2F7;--surf:#FFFFFF;--card:#FFFFFF;--card2:#F8F8FC;--b1:#E5E5EA;--text:#1C1C1E;--soft:#636366;--muted:#8E8E93;--shadow:rgba(0,0,0,.08);--fire:#FF4500;--gold:#FF9500;--green:#34C759;--blue:#007AFF;--red:#FF3B30;}
body.dark{--bg:#0A0A12;--surf:#0F0F1A;--card:#141422;--card2:#1A1A2E;--b1:#1E1E32;--text:#EEEEF5;--soft:#9090B0;--muted:#4A4A65;--shadow:rgba(0,0,0,.3);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);min-height:100vh;font-family:'Roboto',sans-serif;transition:background .3s}
body.ar{font-family:'Cairo',sans-serif}

.topbar{background:var(--surf);border-bottom:1px solid var(--b1);padding:0 14px;position:sticky;top:0;z-index:100;box-shadow:0 1px 4px var(--shadow)}
.topbar-inner{display:flex;align-items:center;gap:10px;height:52px;direction:ltr}
.back-btn{display:flex;align-items:center;gap:5px;color:var(--fire);font-size:14px;font-weight:700;cursor:pointer;text-decoration:none;font-family:inherit;background:none;border:none;padding:0}
.topbar-title{flex:1;font-size:15px;font-weight:700;color:var(--text);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbtn{width:30px;height:30px;border-radius:8px;background:var(--card2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px;font-weight:700;color:var(--text);font-family:inherit}

/* HERO */
.hero{background:var(--surf);border-bottom:1px solid var(--b1);padding:18px 16px}
.hero-main{display:flex;gap:14px;align-items:flex-start;margin-bottom:14px;direction:ltr}
.hero-icon{width:84px;height:84px;border-radius:18px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:42px;flex-shrink:0;border:1px solid var(--b1);background:var(--card2)}
.hero-icon img{width:100%;height:100%;object-fit:cover}
.hero-info{flex:1;min-width:0}
.hero-name{font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px}
.hero-dev{font-size:12px;color:var(--muted);margin-bottom:8px}
.hero-tags{display:flex;gap:5px;flex-wrap:wrap}
.tag{font-size:10px;padding:3px 9px;border-radius:6px;font-weight:700}
.tag.r{background:rgba(255,69,0,.1);color:var(--fire);border:1px solid rgba(255,69,0,.15)}
.tag.b{background:rgba(0,122,255,.1);color:var(--blue);border:1px solid rgba(0,122,255,.15)}
.tag.g{background:rgba(52,199,89,.1);color:var(--green);border:1px solid rgba(52,199,89,.15)}
.tag.o{background:rgba(255,149,0,.1);color:var(--gold);border:1px solid rgba(255,149,0,.15)}

/* BTN ROW */
.btn-row{display:flex;gap:8px;direction:ltr}
.btn-install{flex:2;padding:13px;background:var(--fire);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px rgba(255,69,0,.25);display:flex;align-items:center;justify-content:center;gap:6px}
body.dark .btn-install{background:linear-gradient(135deg,var(--fire),#FF6B35)}
.btn-share{flex:1;padding:13px;background:rgba(0,122,255,.08);border:1.5px solid rgba(0,122,255,.25);color:var(--blue);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.btn-admin-del{flex:1;padding:13px;background:rgba(255,59,48,.08);border:1.5px solid rgba(255,59,48,.2);color:var(--red);border-radius:10px;font-family:inherit;font-size:13px;font-weight:700;cursor:pointer}

/* STATS */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 16px 0}
.stat-box{background:var(--card2);border:1px solid var(--b1);border-radius:10px;padding:10px 6px;text-align:center}
.stat-v{font-size:13px;font-weight:700;color:var(--fire)}
.stat-k{font-size:9px;color:var(--muted);margin-top:2px}

/* SECTIONS */
.sec{padding:14px 16px 6px}
.sec-t{font-size:14px;font-weight:700;color:var(--text)}
.desc-box{margin:0 16px 12px;background:var(--surf);border:1px solid var(--b1);border-radius:10px;padding:12px;font-size:13px;color:var(--soft);line-height:1.7}

/* SIMILAR */
.sim-list{padding:0 16px 16px;display:flex;flex-direction:column;gap:0}
.sim-item{display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);cursor:pointer;direction:ltr}
.sim-item:last-child{border-bottom:none}
.sim-ico{width:46px;height:46px;border-radius:11px;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid var(--b1);background:var(--card2);flex-shrink:0}
.sim-ico img{width:100%;height:100%;object-fit:cover}
.sim-info{flex:1;min-width:0}
.sim-name{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
.sim-cat{font-size:10px;color:var(--muted)}
.sim-sdk{font-size:10px;color:var(--blue);font-weight:700}
.btn-sim-inst{padding:6px 14px;border-radius:15px;font-size:11px;font-weight:700;background:rgba(0,122,255,.1);border:1.5px solid rgba(0,122,255,.25);color:var(--blue);cursor:pointer;font-family:inherit;flex-shrink:0}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--muted)}
.spin{display:inline-block;width:20px;height:20px;border:2px solid rgba(255,69,0,.2);border-top-color:var(--fire);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* TOAST */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(8px);background:var(--card);border:1px solid var(--b1);color:var(--text);padding:8px 16px;border-radius:8px;font-size:11px;font-weight:600;z-index:300;opacity:0;transition:all .22s;white-space:nowrap;box-shadow:0 3px 14px var(--shadow);pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.not-found{text-align:center;padding:60px 20px;color:var(--muted)}
.not-found-i{font-size:50px;margin-bottom:10px}
</style>
</head>
<body class="light">

<div class="topbar">
  <div class="topbar-inner">
    <button class="back-btn" onclick="window.location='/'">← <span id="t-back">Back</span></button>
    <div class="topbar-title" id="pageTitle">PhoenixStore</div>
    <button class="hbtn" id="themeBtn" onclick="toggleTheme()">🌙</button>
  </div>
</div>

<div id="mainContent">
  <div class="loading"><div class="spin"></div><br>Loading...</div>
</div>

<div class="toast" id="toast"></div>

<script>
let curLang=localStorage.getItem('px_lang')||'en';
let curTheme=localStorage.getItem('px_theme')||'light';
let adminToken=localStorage.getItem('px_at')||'';
let appData=null;

const T={
  en:{back:'← Back',install:'⬇️ Install Free',share:'🔗 Share',version:'Version',size:'Size',downloads:'Downloads',android:'Android',desc:'Description',similar:'Similar Apps',free:'Free',noDesc:'Lightweight free Android app.',deleted:'Deleted successfully',shareMsg:'Copy the link to share this app'},
  ar:{back:'→ رجوع',install:'⬇️ تثبيت مجاني',share:'🔗 مشاركة',version:'الإصدار',size:'الحجم',downloads:'تحميل',android:'أندرويد',desc:'الوصف',similar:'تطبيقات مشابهة',free:'مجاني',noDesc:'تطبيق أندرويد خفيف ومجاني.',deleted:'تم الحذف',shareMsg:'انسخ الرابط لمشاركة التطبيق'}
};

window.onload=function(){
  applyTheme(curTheme);
  applyLang(curLang);
  loadApp();
};

function applyTheme(t){
  curTheme=t;
  document.body.classList.remove('light','dark');
  document.body.classList.add(t);
  document.getElementById('themeBtn').textContent=t==='light'?'🌙':'☀️';
  localStorage.setItem('px_theme',t);
}
function toggleTheme(){applyTheme(curTheme==='light'?'dark':'light')}

function applyLang(lang){
  curLang=lang;
  const isAr=lang==='ar';
  document.body.classList.toggle('ar',isAr);
  document.documentElement.dir=isAr?'rtl':'ltr';
  document.getElementById('t-back').textContent=T[lang].back;
}

function getIconImg(a,sz){
  const style=`width:${sz}px;height:${sz}px;object-fit:cover;border-radius:${sz-3}px`;
  if(a.icon_path) return `<img src="/${a.icon_path}" style="${style}" onerror="this.outerHTML='📦'">`;
  if(a.package) return `<img src="https://play-lh.googleusercontent.com/a/${a.package}" style="${style}" onerror="this.outerHTML='📦'">`;
  return '📦';
}

async function loadApp(){
  const filename=decodeURIComponent(window.location.pathname.replace('/app/',''));
  try{
    const r=await fetch('/api/app/'+encodeURIComponent(filename));
    if(!r.ok) throw new Error('not found');
    const data=await r.json();
    appData=data.app;
    renderApp(data.app,data.similar);
  }catch(e){
    document.getElementById('mainContent').innerHTML=`
      <div class="not-found">
        <div class="not-found-i">😕</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:6px">App not found</div>
        <a href="/" style="color:var(--fire);font-size:13px;font-weight:700">← Back to Store</a>
      </div>`;
  }
}

function renderApp(a,similar){
  const t=T[curLang];
  const isAdmin=adminToken!=='';
  document.title=a.name+' - PhoenixStore';
  document.getElementById('pageTitle').textContent=a.name;

  document.getElementById('mainContent').innerHTML=`
    <div class="hero">
      <div class="hero-main">
        <div class="hero-icon" style="background:${a.color||'#1A1A2E'}">${getIconImg(a,84)}</div>
        <div class="hero-info">
          <div class="hero-name">${a.name}</div>
          <div class="hero-dev">${a.uploader||'admin'} · ${a.date||''}</div>
          <div class="hero-tags">
            <span class="tag r">${a.cat}</span>
            <span class="tag b">v${a.ver||'1.0'}</span>
            ${a.min_android?`<span class="tag o">Android ${a.min_android}+</span>`:''}
            <span class="tag g">${t.free}</span>
          </div>
        </div>
      </div>
      <div class="btn-row">
        <button class="btn-install" onclick="doInstall('${a.file}','${a.name}')">${t.install}</button>
        <button class="btn-share" onclick="shareApp('${a.file}','${a.name}')">${t.share}</button>
        ${isAdmin?`<button class="btn-admin-del" onclick="deleteApp('${a.file}','${a.name}')">🗑️</button>`:''}
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box"><div class="stat-v">v${a.ver||'1.0'}</div><div class="stat-k">${t.version}</div></div>
      <div class="stat-box"><div class="stat-v">${a.size||'?'}</div><div class="stat-k">${t.size}</div></div>
      <div class="stat-box"><div class="stat-v">${a.downloads||0}</div><div class="stat-k">${t.downloads}</div></div>
      <div class="stat-box"><div class="stat-v">${a.min_android||'?'}+</div><div class="stat-k">${t.android}</div></div>
    </div>

    <div class="sec"><div class="sec-t">${t.desc}</div></div>
    <div class="desc-box">${a.desc||t.noDesc}</div>

    ${similar.length?`
    <div class="sec"><div class="sec-t">${t.similar}</div></div>
    <div class="sim-list">
      ${similar.map(s=>`
        <div class="sim-item" onclick="window.location='/app/${encodeURIComponent(s.file)}'">
          <div class="sim-ico" style="background:${s.color||'#1A1A2E'}">${getIconImg(s,46)}</div>
          <div class="sim-info">
            <div class="sim-name">${s.name}</div>
            <div class="sim-cat">${s.cat}</div>
            ${s.min_android?`<div class="sim-sdk">Android ${s.min_android}+</div>`:''}
          </div>
          <button class="btn-sim-inst" onclick="event.stopPropagation();doInstall('${s.file}','${s.name}')">${t.install||'Install'}</button>
        </div>`).join('')}
    </div>`:''}
  `;
}

async function doInstall(file,name){
  try{await fetch('/api/download/'+file,{method:'POST'})}catch(e){}
  const a=document.createElement('a');a.href='/apks/'+file;a.download=file;a.click();
  showToast('⬇️ Downloading '+name);
}

function shareApp(file,name){
  const url=window.location.href;
  if(navigator.share){
    navigator.share({title:name,url:url}).catch(()=>{});
  }else{
    navigator.clipboard.writeText(url).then(()=>showToast('🔗 Link copied!')).catch(()=>showToast('🔗 '+url));
  }
}

async function deleteApp(file,name){
  if(!confirm('Delete "'+name+'"?'))return;
  try{
    const r=await fetch('/api/delete/'+file,{method:'DELETE',headers:{'X-Admin-Token':adminToken}});
    if(r.ok){showToast('🗑️ '+T[curLang].deleted);setTimeout(()=>window.location='/',1500);}
  }catch(e){showToast('❌ Error')}
}

let tT;
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  clearTimeout(tT);tT=setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
</body>
</html>
